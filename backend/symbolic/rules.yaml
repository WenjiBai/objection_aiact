# OBJECTION! AI ACT — Symbolic Risk Gate rules v2
#
# Every key inside `when:` MUST be either an EvidenceCategory value
# (shared/schema.py::EvidenceCategory) or a documented exception below.
#
# Allowed `when` keys (mirroring EvidenceCategory):
#   sector, output, purpose, users, affected_persons, input_data,
#   automation_level, human_oversight, deployment_context,
#   ai_generated_content, gpai_usage, decision_impact, other
#
# Match semantics:
#   - For typed-enum categories:
#       sector       → equality (scalar) / "in" (list) against
#                      Evidence.structured_value (Sector enum value)
#       output       → equality / "in" against
#                      Evidence.structured_value (OutputType enum value)
#       gpai_usage   → equality against structured_value
#                      ("true" / "false" / "unknown") or bool literal
#       ai_generated_content → bool match
#   - For free-text categories (purpose, users, affected_persons,
#     deployment_context, input_data, decision_impact, other):
#       scalar value → case-insensitive substring match against
#                      Evidence.text (or equality against structured_value
#                      if Detective set one)
#       list value   → matches if ANY element substring-matches
#   - human_oversight and automation_level accept normalised state
#     strings the Detective writes into structured_value
#     (e.g. "unverified", "narrow_procedural", "improves_human_activity").
#
# Derived flags (high_risk_candidate, preliminary_tier, exemption_candidate,
# transparency_obligation, etc.) live ONLY in `then:` actions and downstream
# verdict state — never in `when:`.
#
# Severities drive UI badge colour: high / medium / low.

# ----------------------------------------------------------------- prohibited

- id: R-PROHIBITED-EMOTION-WORK
  description: Emotion recognition in workplace or education (Article 5 prohibition)
  when:
    sector: [employment, education]
    output: [detection, classification]
    purpose: emotion              # keyword match in purpose evidence text
  then:
    preliminary_tier: prohibited
    basis: "AI Act Article 5(1)(f) — emotion recognition in workplace and education"
  maps_to_refs: [R-Art-5, R-Recital-44]
  severity: high

- id: R-PROHIBITED-SOCIAL-SCORE
  description: Social scoring by public or private actors (Article 5 prohibition)
  when:
    output: [scoring, classification]
    affected_persons: [general_public, citizens]   # keyword match
    purpose: social_behaviour                      # keyword match
  then:
    preliminary_tier: prohibited
    basis: "AI Act Article 5(1)(c) — social scoring leading to detrimental treatment"
  maps_to_refs: [R-Art-5, R-Recital-31]
  severity: high

# ------------------------------------------------------------ high-risk (Annex III)

- id: R-HIRE-001
  description: Employment-related ranking or screening (Annex III #4)
  when:
    sector: employment
    output: [ranking, screening, recommendation, scoring]
    affected_persons: [job_applicants, workers]
  then:
    preliminary_tier: potential_high_risk
    high_risk_candidate: true
    basis: "AI Act Annex III §4 — employment, workers management, access to self-employment"
  maps_to_refs: [R-Annex-III-4, R-Art-6]
  severity: high

- id: R-CRED-001
  description: Creditworthiness or credit-scoring of natural persons (Annex III #5(b))
  when:
    sector: [finance, essential_services]
    output: [scoring, classification, decision]
    purpose: creditworthiness     # keyword match
  then:
    preliminary_tier: potential_high_risk
    high_risk_candidate: true
    basis: "AI Act Annex III §5(b) — credit scoring of natural persons"
  maps_to_refs: [R-Annex-III-5, R-Art-6]
  severity: high

- id: R-EDU-001
  description: Education access, scoring, or assignment to institutions (Annex III #3)
  when:
    sector: education
    output: [ranking, scoring, decision, classification]
    affected_persons: [students, applicants]
  then:
    preliminary_tier: potential_high_risk
    high_risk_candidate: true
    basis: "AI Act Annex III §3 — education and vocational training access"
  maps_to_refs: [R-Annex-III-3, R-Art-6]
  severity: high

- id: R-BIOMETRIC-001
  description: Remote biometric identification or categorisation (Annex III #1)
  when:
    sector: [biometrics, law_enforcement]
    output: [classification, detection, decision]
  then:
    preliminary_tier: potential_high_risk
    high_risk_candidate: true
    basis: "AI Act Annex III §1 — biometric identification and categorisation"
  maps_to_refs: [R-Annex-III-1, R-Art-6]
  severity: high

# --------------------------------------------------------- transparency / GPAI

- id: R-CHAT-001
  description: AI system interacting directly with humans (chatbot) → Article 50 transparency
  when:
    deployment_context: [chatbot, direct_user_interaction]   # keyword match
  then:
    transparency_obligation: true
    basis: "AI Act Article 50(1) — disclose AI interaction to natural persons"
  maps_to_refs: [R-Art-50, R-Recital-132]
  severity: medium

- id: R-GENAI-001
  description: AI-generated or manipulated content → Article 50 labelling
  when:
    output: [generation]
    ai_generated_content: true
  then:
    transparency_obligation: true
    basis: "AI Act Article 50(2)/(4) — label synthetic or deep-fake content"
  maps_to_refs: [R-Art-50, R-Recital-134]
  severity: medium

- id: R-GPAI-001
  description: Use of general-purpose AI model → GPAI responsibility chain (Chapter V)
  when:
    gpai_usage: true
  then:
    trigger: gpai_responsibility_chain_analysis
    basis: "AI Act Chapter V — GPAI provider obligations and downstream documentation"
  maps_to_refs: [R-Art-51, R-Art-53, R-Art-55]
  severity: medium

# ---------------------------------------------------- oversight & governance

- id: R-OVERSIGHT-001
  description: Human oversight claimed but not documented (override mechanism missing)
  when:
    human_oversight: unverified
  then:
    require_evidence: true
    objection_target: oversight_claim
    basis: "AI Act Article 14 — human oversight design and documentation"
  maps_to_refs: [R-Art-14]
  severity: medium

- id: R-EXEMPT-PROCEDURAL
  description: |
    High-risk exemption candidate — system performs only a narrow procedural task.
    Applies only when an upstream rule has already flagged high_risk_candidate=true
    in its then_actions; the Judge/evaluator enforces that gating.
  when:
    automation_level: narrow_procedural
  then:
    exemption_candidate: true
    requires_documentation: true
    applies_only_if_high_risk_candidate: true
    basis: "AI Act Article 6(3)(a) — narrow procedural task exemption"
  maps_to_refs: [R-Art-6]
  severity: low

- id: R-EXEMPT-IMPROVE
  description: |
    High-risk exemption candidate — system improves the result of previous human
    activity. Applies only when an upstream rule has already flagged
    high_risk_candidate=true in its then_actions.
  when:
    automation_level: improves_human_activity
  then:
    exemption_candidate: true
    requires_documentation: true
    applies_only_if_high_risk_candidate: true
    basis: "AI Act Article 6(3)(b) — improves previously completed human activity"
  maps_to_refs: [R-Art-6]
  severity: low

- id: R-FRIA-REQUIRED
  description: |
    Deployer FRIA required when an Annex III high-risk sector is deployed by a
    public body or essential-service provider. Redesigned to be fact-driven
    (sector + deployment_context) rather than verdict-driven, so it can fire
    inside the symbolic gate without depending on the Judge's tier.
  when:
    sector: [employment, education, biometrics, law_enforcement, migration_border,
             justice_democracy, essential_services, critical_infrastructure, finance]
    deployment_context: [public_body, essential_services, public_service]   # keyword match
  then:
    require_evidence: true
    obligation: fundamental_rights_impact_assessment
    basis: "AI Act Article 27 — FRIA prior to deployment"
  maps_to_refs: [R-Art-27]
  severity: high
